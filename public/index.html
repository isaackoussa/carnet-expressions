ation": "S'utilise pour inviter chaleureusement un visiteur à se sentir à l'aise.", "exemple_en": "Come in and make yourself at home.", "exemple_fr": "Entre et fais comme chez toi."}, {"expression": "It's up to you", "categorie": "Expressions du quotidien", "traduction": "C'est toi qui vois / c'est à toi de décider", "explication": "Utilisé pour laisser le choix ou la décision à l'autre personne.", "exemple_en": "We can go to the beach or the mountains, it's up to you.", "exemple_fr": "On peut aller à la plage ou à la montagne, c'est toi qui vois."}, {"expression": "Take your time", "categorie": "Expressions du quotidien", "traduction": "Prends ton temps", "explication": "S'utilise pour dire à quelqu'un qu'il n'y a pas d'urgence.", "exemple_en": "Take your time, there's no rush.", "exemple_fr": "Prends ton temps, il n'y a pas d'urgence."}, {"expression": "I couldn't agree more", "categorie": "Expressions du quotidien", "traduction": "Je suis totalement d'accord", "explication": "Utilisé pour exprimer un accord fort avec ce que quelqu'un vient de dire.", "exemple_en": "I couldn't agree more with your opinion on this matter.", "exemple_fr": "Je suis totalement d'accord avec ton avis sur ce sujet."}, {"expression": "Never mind", "categorie": "Expressions du quotidien", "traduction": "Laisse tomber", "explication": "S'utilise pour dire à quelqu'un de ne pas se soucier de quelque chose, ou pour minimiser une erreur.", "exemple_en": "Never mind, it wasn't important anyway.", "exemple_fr": "Laisse tomber, ce n'était pas important de toute façon."}, {"expression": "What's the catch?", "categorie": "Expressions du quotidien", "traduction": "C'est quoi le piège ?", "explication": "S'utilise avec méfiance quand une offre semble trop belle pour être vraie.", "exemple_en": "This deal sounds too good, what's the catch?", "exemple_fr": "Cette offre a l'air trop belle, c'est quoi le piège ?"}, {"expression": "Sounds good to me", "categorie": "Expressions du quotidien", "traduction": "Ça me va", "explication": "Utilisé pour accepter une proposition ou un plan de façon informelle.", "exemple_en": "Let's meet at 6pm. Sounds good to me!", "exemple_fr": "On se retrouve à 18h. Ça me va !"}, {"expression": "I'm all ears", "categorie": "Expressions du quotidien", "traduction": "Je t'écoute (attentivement)", "explication": "S'utilise pour montrer que l'on est prêt à écouter attentivement ce que quelqu'un va dire.", "exemple_en": "Go ahead, tell me what happened, I'm all ears.", "exemple_fr": "Vas-y, raconte-moi ce qui s'est passé, je t'écoute."}, {"expression": "Touch base", "categorie": "Anglais professionnel", "traduction": "Reprendre contact / faire le point", "explication": "S'utilise en contexte professionnel pour proposer un bref échange de mise à jour.", "exemple_en": "Let's touch base next week about the project status.", "exemple_fr": "Faisons le point la semaine prochaine sur l'avancement du projet."}, {"expression": "Circle back", "categorie": "Anglais professionnel", "traduction": "Revenir sur un sujet plus tard", "explication": "Utilisé en réunion pour indiquer que l'on abordera un point plus tard.", "exemple_en": "Let's circle back to this topic after the break.", "exemple_fr": "Revenons sur ce sujet après la pause."}, {"expression": "On the same page", "categorie": "Anglais professionnel", "traduction": "Être sur la même longueur d'onde", "explication": "S'utilise pour dire que deux personnes ou équipes ont la même compréhension d'une situation.", "exemple_en": "Before we proceed, let's make sure we're all on the same page.", "exemple_fr": "Avant de continuer, assurons-nous d'être tous sur la même longueur d'onde."}, {"expression": "Think outside the box", "categorie": "Anglais professionnel", "traduction": "Sortir des sentiers battus", "explication": "Encourage à trouver des solutions créatives et non conventionnelles.", "exemple_en": "We need to think outside the box to solve this problem.", "exemple_fr": "On doit sortir des sentiers battus pour résoudre ce problème."}, {"expression": "Low-hanging fruit", "categorie": "Anglais professionnel", "traduction": "Les tâches faciles à accomplir en premier", "explication": "Désigne les objectifs faciles à atteindre rapidement avant de s'attaquer aux tâches plus complexes.", "exemple_en": "Let's start with the low-hanging fruit before tackling the harder tasks.", "exemple_fr": "Commençons par les tâches faciles avant de s'attaquer aux plus complexes."}, {"expression": "Ballpark figure", "categorie": "Anglais professionnel", "traduction": "Estimation approximative", "explication": "S'utilise pour demander ou donner un chiffre approximatif, sans précision exacte.", "exemple_en": "Can you give me a ballpark figure for the total cost?", "exemple_fr": "Peux-tu me donner une estimation approximative du coût total ?"}, {"expression": "Move the needle", "categorie": "Anglais professionnel", "traduction": "Avoir un impact significatif", "explication": "S'utilise pour parler d'une action qui produit un résultat mesurable et notable.", "exemple_en": "This new strategy really moved the needle on our sales.", "exemple_fr": "Cette nouvelle stratégie a vraiment eu un impact significatif sur nos ventes."}, {"expression": "Get the ball rolling", "categorie": "Anglais professionnel", "traduction": "Lancer le mouvement, démarrer un projet", "explication": "S'utilise pour signifier le démarrage effectif d'un projet ou d'une action.", "exemple_en": "Let's get the ball rolling on the new marketing campaign.", "exemple_fr": "Lançons le mouvement sur la nouvelle campagne marketing."}, {"expression": "Have the bandwidth", "categorie": "Anglais professionnel", "traduction": "Avoir le temps/les ressources disponibles", "explication": "S'utilise en contexte professionnel pour parler de disponibilité, empruntée au vocabulaire informatique.", "exemple_en": "I don't have the bandwidth to take on another project right now.", "exemple_fr": "Je n'ai pas les ressources disponibles pour prendre un autre projet en ce moment."}, {"expression": "Deep dive", "categorie": "Anglais professionnel", "traduction": "Analyse approfondie", "explication": "Désigne une étude ou discussion détaillée sur un sujet précis.", "exemple_en": "We need a deep dive into the customer feedback data.", "exemple_fr": "On a besoin d'une analyse approfondie des retours clients."}, {"expression": "Take it offline", "categorie": "Anglais professionnel", "traduction": "En discuter en privé après la réunion", "explication": "S'utilise pour proposer de poursuivre une discussion en dehors du cadre officiel d'une réunion.", "exemple_en": "This is a good point, but let's take it offline after the meeting.", "exemple_fr": "C'est un bon point, mais discutons-en en privé après la réunion."}, {"expression": "Push back", "categorie": "Anglais professionnel", "traduction": "Repousser un délai / exprimer un désaccord", "explication": "Peut signifier reporter une échéance, ou s'opposer poliment à une proposition.", "exemple_en": "The client wants to push back the deadline by two weeks.", "exemple_fr": "Le client veut repousser l'échéance de deux semaines."}, {"expression": "That's a bummer", "categorie": "Expressions familières", "traduction": "C'est nul / dommage", "explication": "Expression informelle pour exprimer la déception face à une mauvaise nouvelle.", "exemple_en": "You missed the concert? That's a bummer.", "exemple_fr": "Tu as raté le concert ? C'est dommage."}, {"expression": "I'm broke", "categorie": "Expressions familières", "traduction": "Je suis fauché", "explication": "S'utilise pour dire que l'on n'a plus ou très peu d'argent.", "exemple_en": "I can't go out tonight, I'm totally broke.", "exemple_fr": "Je ne peux pas sortir ce soir, je suis complètement fauché."}, {"expression": "Chill out", "categorie": "Expressions familières", "traduction": "Se détendre, se calmer", "explication": "S'utilise pour inviter quelqu'un à se relaxer ou à ne pas s'énerver.", "exemple_en": "Just chill out, everything is under control.", "exemple_fr": "Détends-toi, tout est sous contrôle."}, {"expression": "My bad", "categorie": "Expressions familières", "traduction": "C'est ma faute, désolé", "explication": "Façon très informelle de s'excuser rapidement pour une petite erreur.", "exemple_en": "Oh, my bad, I forgot to call you back.", "exemple_fr": "Oh, désolé, j'ai oublié de te rappeler."}, {"expression": "Sketchy", "categorie": "Expressions familières", "traduction": "Louche", "explication": "Décrit une personne, un lieu ou une situation qui inspire la méfiance.", "exemple_en": "That neighborhood looks a bit sketchy at night.", "exemple_fr": "Ce quartier a l'air un peu louche la nuit."}, {"expression": "I'm beat", "categorie": "Expressions familières", "traduction": "Je suis épuisé", "explication": "S'utilise de façon informelle pour dire que l'on est très fatigué.", "exemple_en": "I'm beat after that long meeting, I need a nap.", "exemple_fr": "Je suis épuisé après cette longue réunion, j'ai besoin d'une sieste."}, {"expression": "Spill the tea", "categorie": "Expressions familières", "traduction": "Raconte tout (les ragots)", "explication": "Expression très familière et moderne pour demander à quelqu'un de partager des informations ou des ragots.", "exemple_en": "Okay, spill the tea, what happened at the party?", "exemple_fr": "Bon, raconte tout, qu'est-ce qui s'est passé à la fête ?"}, {"expression": "No biggie", "categorie": "Expressions familières", "traduction": "C'est pas grave", "explication": "Version informelle pour dire que quelque chose n'a pas d'importance.", "exemple_en": "You're a bit late, no biggie, come on in.", "exemple_fr": "Tu es un peu en retard, c'est pas grave, entre."}, {"expression": "Crash at someone's place", "categorie": "Expressions familières", "traduction": "Dormir chez quelqu'un à l'improviste", "explication": "S'utilise pour parler d'un hébergement de dernière minute, souvent informel.", "exemple_en": "I missed my train, can I crash at your place tonight?", "exemple_fr": "J'ai raté mon train, je peux dormir chez toi ce soir ?"}, {"expression": "Ghost someone", "categorie": "Expressions familières", "traduction": "Ignorer quelqu'un du jour au lendemain", "explication": "Décrit le fait de couper subitement tout contact avec quelqu'un sans explication.", "exemple_en": "He just ghosted me after our third date.", "exemple_fr": "Il m'a juste ignorée du jour au lendemain après notre troisième rendez-vous."}, {"expression": "Binge-watch", "categorie": "Expressions familières", "traduction": "Regarder plusieurs épisodes d'affilée", "explication": "S'utilise pour parler du visionnage prolongé d'une série télévisée en une seule fois.", "exemple_en": "I binge-watched the whole season in one weekend.", "exemple_fr": "J'ai regardé toute la saison d'affilée en un week-end."}, {"expression": "That's lit", "categorie": "Expressions familières", "traduction": "C'est génial (très familier)", "explication": "Expression très familière et jeune pour dire que quelque chose est excellent ou impressionnant.", "exemple_en": "The concert last night was absolutely lit.", "exemple_fr": "Le concert d'hier soir était vraiment génial."}, {"expression": "Better late than never", "categorie": "Proverbes et dictons", "traduction": "Mieux vaut tard que jamais", "explication": "S'utilise pour relativiser un retard ou un délai, en soulignant que l'important est d'y arriver quand même.", "exemple_en": "She finally finished her degree at 40. Better late than never!", "exemple_fr": "Elle a enfin terminé ses études à 40 ans. Mieux vaut tard que jamais !"}, {"expression": "Actions speak louder than words", "categorie": "Proverbes et dictons", "traduction": "Les actes valent plus que les mots", "explication": "Souligne que ce que l'on fait compte davantage que ce que l'on promet.", "exemple_en": "He says he cares, but actions speak louder than words.", "exemple_fr": "Il dit qu'il tient à elle, mais les actes valent plus que les mots."}, {"expression": "Don't judge a book by its cover", "categorie": "Proverbes et dictons", "traduction": "Il ne faut pas se fier aux apparences", "explication": "Invite à ne pas juger une personne ou une chose uniquement sur son apparence.", "exemple_en": "He looked intimidating, but don't judge a book by its cover.", "exemple_fr": "Il avait l'air intimidant, mais il ne faut pas se fier aux apparences."}, {"expression": "When in Rome, do as the Romans do", "categorie": "Proverbes et dictons", "traduction": "À Rome, fais comme les Romains", "explication": "Conseille de s'adapter aux coutumes locales lorsqu'on est dans un nouvel environnement.", "exemple_en": "I don't usually eat spicy food, but when in Rome, do as the Romans do.", "exemple_fr": "Je ne mange pas épicé d'habitude, mais à Rome, fais comme les Romains."}, {"expression": "The early bird catches the worm", "categorie": "Proverbes et dictons", "traduction": "Le monde appartient à ceux qui se lèvent tôt", "explication": "Souligne l'avantage d'agir tôt ou d'être proactif.", "exemple_en": "He always arrives first at work; the early bird catches the worm.", "exemple_fr": "Il arrive toujours le premier au travail ; le monde appartient à ceux qui se lèvent tôt."}, {"expression": "Practice makes perfect", "categorie": "Proverbes et dictons", "traduction": "C'est en forgeant qu'on devient forgeron", "explication": "Encourage la répétition et l'entraînement pour progresser dans un domaine.", "exemple_en": "Keep practicing your English every day, practice makes perfect.", "exemple_fr": "Continue de pratiquer ton anglais tous les jours, c'est en forgeant qu'on devient forgeron."}, {"expression": "Every cloud has a silver lining", "categorie": "Proverbes et dictons", "traduction": "Après la pluie, le beau temps", "explication": "S'utilise pour trouver du positif même dans une situation difficile.", "exemple_en": "I lost my job, but every cloud has a silver lining—now I can start my own business.", "exemple_fr": "J'ai perdu mon travail, mais après la pluie, le beau temps—maintenant je peux lancer mon entreprise."}, {"expression": "You can't have your cake and eat it too", "categorie": "Proverbes et dictons", "traduction": "On ne peut pas avoir le beurre et l'argent du beurre", "explication": "Souligne qu'il faut parfois faire un choix, car on ne peut pas tout avoir à la fois.", "exemple_en": "You want a high salary but also no responsibilities—you can't have your cake and eat it too.", "exemple_fr": "Tu veux un gros salaire mais sans responsabilités—on ne peut pas avoir le beurre et l'argent du beurre."}, {"expression": "Out of sight, out of mind", "categorie": "Proverbes et dictons", "traduction": "Loin des yeux, loin du cœur", "explication": "Décrit le fait qu'on oublie plus facilement une personne ou une chose lorsqu'elle n'est plus présente.", "exemple_en": "After she moved abroad, their friendship faded—out of sight, out of mind.", "exemple_fr": "Après son déménagement à l'étranger, leur amitié s'est estompée—loin des yeux, loin du cœur."}, {"expression": "The grass is always greener on the other side", "categorie": "Proverbes et dictons", "traduction": "L'herbe est toujours plus verte ailleurs", "explication": "Souligne la tendance à idéaliser la situation des autres.", "exemple_en": "He keeps changing jobs, thinking the grass is always greener on the other side.", "exemple_fr": "Il change constamment de travail, pensant que l'herbe est toujours plus verte ailleurs."}, {"expression": "Don't count your chickens before they hatch", "categorie": "Proverbes et dictons", "traduction": "Il ne faut pas vendre la peau de l'ours avant de l'avoir tué", "explication": "Met en garde contre le fait de compter sur un résultat avant qu'il ne soit certain.", "exemple_en": "We haven't signed the contract yet, so don't count your chickens before they hatch.", "exemple_fr": "On n'a pas encore signé le contrat, donc ne vends pas la peau de l'ours avant de l'avoir tué."}, {"expression": "Curiosity killed the cat", "categorie": "Proverbes et dictons", "traduction": "La curiosité est un vilain défaut", "explication": "Avertit qu'être trop curieux peut mener à des ennuis.", "exemple_en": "Stop asking so many questions—curiosity killed the cat.", "exemple_fr": "Arrête de poser autant de questions—la curiosité est un vilain défaut."}, {"expression": "Break a leg", "categorie": "Expressions idiomatiques", "traduction": "Bonne chance", "explication": "S'utilise surtout dans le milieu du spectacle pour souhaiter bonne chance avant une représentation, car dire directement 'good luck' porterait malheur selon la tradition.", "exemple_en": "You've got the audition today, break a leg!", "exemple_fr": "Tu as ton audition aujourd'hui, bonne chance !"}, {"expression": "Speak of the devil", "categorie": "Expressions idiomatiques", "traduction": "Quand on parle du loup", "explication": "S'utilise quand une personne dont on vient juste de parler apparaît soudainement.", "exemple_en": "Speak of the devil, here comes Mark now.", "exemple_fr": "Quand on parle du loup, voilà Mark qui arrive."}, {"expression": "Barking up the wrong tree", "categorie": "Expressions idiomatiques", "traduction": "Se tromper de cible / de piste", "explication": "S'utilise quand quelqu'un fait une accusation ou poursuit une solution qui n'est pas la bonne.", "exemple_en": "If you think I took your book, you're barking up the wrong tree.", "exemple_fr": "Si tu penses que j'ai pris ton livre, tu te trompes de cible."}, {"expression": "Burn the midnight oil", "categorie": "Expressions idiomatiques", "traduction": "Travailler tard dans la nuit", "explication": "Décrit le fait de rester éveillé tard pour travailler ou étudier.", "exemple_en": "She had to burn the midnight oil to finish her thesis.", "exemple_fr": "Elle a dû travailler tard dans la nuit pour finir sa thèse."}, {"expression": "Cut corners", "categorie": "Expressions idiomatiques", "traduction": "Bâcler, économiser au détriment de la qualité", "explication": "S'utilise pour critiquer le fait de faire quelque chose de manière moins soignée pour gagner du temps ou de l'argent.", "exemple_en": "The contractor cut corners, and now the roof is leaking.", "exemple_fr": "L'entrepreneur a bâclé le travail, et maintenant le toit fuit."}, {"expression": "Get cold feet", "categorie": "Expressions idiomatiques", "traduction": "Se dégonfler au dernier moment", "explication": "Décrit la perte soudaine de courage juste avant de faire quelque chose d'important.", "exemple_en": "He got cold feet right before the wedding.", "exemple_fr": "Il s'est dégonflé juste avant le mariage."}, {"expression": "Hit the sack", "categorie": "Expressions idiomatiques", "traduction": "Aller se coucher", "explication": "Façon informelle de dire que l'on va dormir.", "exemple_en": "I'm exhausted, I'm going to hit the sack early tonight.", "exemple_fr": "Je suis épuisé, je vais me coucher tôt ce soir."}, {"expression": "It's not rocket science", "categorie": "Expressions idiomatiques", "traduction": "Ce n'est pas sorcier", "explication": "S'utilise pour dire qu'une tâche n'est pas si compliquée qu'elle en a l'air.", "exemple_en": "Come on, it's not rocket science, just follow the instructions.", "exemple_fr": "Allez, ce n'est pas sorcier, suis juste les instructions."}, {"expression": "Jump on the bandwagon", "categorie": "Expressions idiomatiques", "traduction": "Suivre la tendance", "explication": "Décrit le fait de rejoindre une tendance populaire, parfois sans réelle conviction.", "exemple_en": "Everyone is jumping on the bandwagon with this new app.", "exemple_fr": "Tout le monde suit la tendance avec cette nouvelle appli."}, {"expression": "On thin ice", "categorie": "Expressions idiomatiques", "traduction": "Marcher sur des œufs / situation fragile", "explication": "S'utilise pour décrire une situation risquée où une erreur pourrait avoir de graves conséquences.", "exemple_en": "After missing another deadline, he's on thin ice with his boss.", "exemple_fr": "Après avoir raté un autre délai, il marche sur des œufs avec son patron."}, {"expression": "Steal someone's thunder", "categorie": "Expressions idiomatiques", "traduction": "Voler la vedette à quelqu'un", "explication": "S'utilise quand quelqu'un s'attribue le mérite ou l'attention destinée à une autre personne.", "exemple_en": "She announced her engagement at my birthday party and stole my thunder.", "exemple_fr": "Elle a annoncé ses fiançailles à ma fête d'anniversaire et m'a volé la vedette."}, {"expression": "The last straw", "categorie": "Expressions idiomatiques", "traduction": "La goutte qui fait déborder le vase", "explication": "Décrit le dernier événement d'une série qui pousse quelqu'un à réagir après avoir supporté beaucoup de choses.", "exemple_en": "Him being late again was the last straw for her.", "exemple_fr": "Le fait qu'il soit encore en retard a été la goutte qui a fait déborder le vase pour elle."}, {"expression": "Time flies", "categorie": "Expressions idiomatiques", "traduction": "Le temps passe vite", "explication": "S'utilise pour exprimer sa surprise face à la rapidité avec laquelle le temps s'est écoulé.", "exemple_en": "Time flies, I can't believe it's already December.", "exemple_fr": "Le temps passe vite, je n'arrive pas à croire qu'on soit déjà en décembre."}, {"expression": "Get over", "categorie": "Verbes à particule", "traduction": "Se remettre de", "explication": "S'utilise pour parler de la guérison après une maladie ou du fait de surmonter une épreuve émotionnelle.", "exemple_en": "It took her months to get over the breakup.", "exemple_fr": "Ça lui a pris des mois pour se remettre de la rupture."}, {"expression": "Look after", "categorie": "Verbes à particule", "traduction": "S'occuper de", "explication": "S'utilise pour parler du fait de prendre soin de quelqu'un ou de quelque chose.", "exemple_en": "Can you look after my dog while I'm away?", "exemple_fr": "Peux-tu t'occuper de mon chien pendant mon absence ?"}, {"expression": "Point out", "categorie": "Verbes à particule", "traduction": "Faire remarquer, souligner", "explication": "S'utilise pour attirer l'attention sur un détail ou une erreur.", "exemple_en": "She pointed out a mistake in the report.", "exemple_fr": "Elle a fait remarquer une erreur dans le rapport."}, {"expression": "Set up", "categorie": "Verbes à particule", "traduction": "Organiser, installer", "explication": "S'utilise pour parler de la mise en place d'un événement, d'un équipement ou d'un système.", "exemple_en": "We need to set up the meeting room before the guests arrive.", "exemple_fr": "On doit installer la salle de réunion avant l'arrivée des invités."}, {"expression": "Sort out", "categorie": "Verbes à particule", "traduction": "Régler, résoudre", "explication": "S'utilise pour parler du fait de résoudre un problème ou de mettre de l'ordre dans quelque chose.", "exemple_en": "I need to sort out my finances this weekend.", "exemple_fr": "Je dois régler mes finances ce week-end."}, {"expression": "Stand out", "categorie": "Verbes à particule", "traduction": "Se démarquer", "explication": "S'utilise pour parler de quelque chose ou quelqu'un qui attire particulièrement l'attention.", "exemple_en": "Her presentation really stood out among the others.", "exemple_fr": "Sa présentation s'est vraiment démarquée des autres."}, {"expression": "Take on", "categorie": "Verbes à particule", "traduction": "Prendre en charge / affronter", "explication": "Peut signifier accepter une nouvelle responsabilité, ou faire face à un adversaire.", "exemple_en": "She decided to take on more responsibilities at work.", "exemple_fr": "Elle a décidé de prendre plus de responsabilités au travail."}, {"expression": "Wear out", "categorie": "Verbes à particule", "traduction": "User, épuiser", "explication": "S'utilise pour un objet qui s'abîme avec le temps, ou une personne épuisée par un effort.", "exemple_en": "These shoes are starting to wear out.", "exemple_fr": "Ces chaussures commencent à s'user."}, {"expression": "Work out", "categorie": "Verbes à particule", "traduction": "Fonctionner, s'arranger / faire du sport", "explication": "Possède deux sens fréquents : dire qu'une situation se résout bien, ou parler de l'activité physique.", "exemple_en": "Don't worry, everything will work out fine.", "exemple_fr": "Ne t'inquiète pas, tout va s'arranger."}, {"expression": "Call off", "categorie": "Verbes à particule", "traduction": "Annuler", "explication": "S'utilise pour dire qu'un événement prévu n'aura finalement pas lieu.", "exemple_en": "They had to call off the picnic because of the rain.", "exemple_fr": "Ils ont dû annuler le pique-nique à cause de la pluie."}, {"expression": "Carry on", "categorie": "Verbes à particule", "traduction": "Continuer", "explication": "S'utilise pour encourager quelqu'un à poursuivre ce qu'il était en train de faire.", "exemple_en": "Please carry on with your work, don't mind me.", "exemple_fr": "Continuez votre travail s'il vous plaît, ne faites pas attention à moi."}, {"expression": "Deal with", "categorie": "Verbes à particule", "traduction": "Gérer, s'occuper de", "explication": "S'utilise pour parler du fait de traiter un problème ou une situation.", "exemple_en": "I'll deal with this issue first thing tomorrow.", "exemple_fr": "Je vais m'occuper de ce problème dès demain matin."}, {"expression": "Hold on", "categorie": "Verbes à particule", "traduction": "Patienter, attendre", "explication": "S'utilise pour demander à quelqu'un d'attendre un instant.", "exemple_en": "Hold on a second, I'll be right back.", "exemple_fr": "Attends une seconde, je reviens tout de suite."}, {"expression": "See you around", "categorie": "Expressions du quotidien", "traduction": "À un de ces jours", "explication": "Façon informelle de dire au revoir sans préciser de moment de retrouvailles.", "exemple_en": "I gotta go now, see you around!", "exemple_fr": "Je dois y aller maintenant, à un de ces jours !"}, {"expression": "It's not a big deal", "categorie": "Expressions du quotidien", "traduction": "Ce n'est pas grave", "explication": "S'utilise pour relativiser une situation ou une erreur.", "exemple_en": "Don't worry about spilling the coffee, it's not a big deal.", "exemple_fr": "Ne t'inquiète pas d'avoir renversé le café, ce n'est pas grave."}, {"expression": "That makes sense", "categorie": "Expressions du quotidien", "traduction": "Ça se tient / c'est logique", "explication": "S'utilise pour confirmer que l'on comprend et trouve logique une explication.", "exemple_en": "Oh, that makes sense now, thanks for explaining.", "exemple_fr": "Ah, ça se tient maintenant, merci pour l'explication."}, {"expression": "I'll get back to you", "categorie": "Expressions du quotidien", "traduction": "Je te recontacte", "explication": "S'utilise pour dire que l'on répondra plus tard à une question ou une demande.", "exemple_en": "I need to check my calendar, I'll get back to you tomorrow.", "exemple_fr": "Je dois vérifier mon agenda, je te recontacte demain."}, {"expression": "Let me know", "categorie": "Expressions du quotidien", "traduction": "Tiens-moi au courant", "explication": "S'utilise pour demander à quelqu'un de nous informer d'une décision ou d'un développement.", "exemple_en": "Let me know if you need any help with the move.", "exemple_fr": "Tiens-moi au courant si tu as besoin d'aide pour le déménagement."}, {"expression": "Same here", "categorie": "Expressions du quotidien", "traduction": "Moi aussi / pareil", "explication": "S'utilise pour exprimer un accord ou une situation similaire à ce qui vient d'être dit.", "exemple_en": "I'm exhausted today. — Same here!", "exemple_fr": "Je suis épuisé aujourd'hui. — Pareil pour moi !"}, {"expression": "You bet", "categorie": "Expressions du quotidien", "traduction": "Carrément / bien sûr", "explication": "Façon enthousiaste et informelle de dire oui.", "exemple_en": "Are you coming to the party? — You bet!", "exemple_fr": "Tu viens à la fête ? — Carrément !"}, {"expression": "Fingers crossed", "categorie": "Expressions du quotidien", "traduction": "Je croise les doigts", "explication": "S'utilise pour exprimer l'espoir qu'une chose se passe bien.", "exemple_en": "I have my interview tomorrow, fingers crossed!", "exemple_fr": "J'ai mon entretien demain, je croise les doigts !"}, {"expression": "Not a chance", "categorie": "Expressions du quotidien", "traduction": "Aucune chance", "explication": "S'utilise pour refuser catégoriquement ou dire qu'un événement est impossible.", "exemple_en": "Are you going to finish this by tonight? Not a chance.", "exemple_fr": "Tu vas finir ça ce soir ? Aucune chance."}, {"expression": "I'm just kidding", "categorie": "Expressions du quotidien", "traduction": "Je plaisante", "explication": "S'utilise pour préciser que l'on vient de faire une blague et qu'il ne faut pas la prendre au sérieux.", "exemple_en": "You failed the test? I'm just kidding, you passed!", "exemple_fr": "Tu as raté le test ? Je plaisante, tu as réussi !"}, {"expression": "It's a small world", "categorie": "Expressions du quotidien", "traduction": "Le monde est petit", "explication": "S'utilise face à une coïncidence surprenante, souvent quand on rencontre une connaissance inattendue.", "exemple_en": "You know my cousin too? It's a small world!", "exemple_fr": "Tu connais aussi mon cousin ? Le monde est petit !"}, {"expression": "Suit yourself", "categorie": "Expressions du quotidien", "traduction": "Fais comme tu veux", "explication": "S'utilise, parfois avec une pointe d'indifférence, pour laisser quelqu'un faire son propre choix.", "exemple_en": "I don't want to come tonight. — Suit yourself.", "exemple_fr": "Je ne veux pas venir ce soir. — Fais comme tu veux."}, {"expression": "Speak for yourself", "categorie": "Expressions du quotidien", "traduction": "Parle pour toi", "explication": "S'utilise pour signaler son désaccord avec une généralisation faite par quelqu'un d'autre.", "exemple_en": "This movie was boring. — Speak for yourself, I loved it!", "exemple_fr": "Ce film était ennuyeux. — Parle pour toi, moi je l'ai adoré !"}, {"expression": "Take ownership", "categorie": "Anglais professionnel", "traduction": "Prendre la responsabilité de", "explication": "S'utilise en contexte professionnel pour valoriser le fait d'assumer pleinement une tâche ou un résultat.", "exemple_en": "She took ownership of the project from day one.", "exemple_fr": "Elle a pris la responsabilité du projet dès le premier jour."}, {"expression": "Value add", "categorie": "Anglais professionnel", "traduction": "Valeur ajoutée", "explication": "S'utilise pour désigner le bénéfice supplémentaire apporté par une action, un produit ou un service.", "exemple_en": "What's the real value add of this new feature?", "exemple_fr": "Quelle est la vraie valeur ajoutée de cette nouvelle fonctionnalité ?"}, {"expression": "Game changer", "categorie": "Anglais professionnel", "traduction": "Un facteur décisif qui change tout", "explication": "Décrit une innovation ou une décision qui transforme radicalement une situation.", "exemple_en": "This new technology could be a real game changer for the industry.", "exemple_fr": "Cette nouvelle technologie pourrait vraiment tout changer pour le secteur."}, {"expression": "Best practice", "categorie": "Anglais professionnel", "traduction": "Bonne pratique", "explication": "Désigne une méthode reconnue comme la plus efficace dans un domaine donné.", "exemple_en": "We should follow industry best practices for data security.", "exemple_fr": "On devrait suivre les bonnes pratiques du secteur pour la sécurité des données."}, {"expression": "Loop someone in", "categorie": "Anglais professionnel", "traduction": "Inclure quelqu'un dans un échange", "explication": "S'utilise pour dire que l'on ajoute une personne à une conversation ou une décision en cours.", "exemple_en": "Let's loop in the marketing team on this decision.", "exemple_fr": "Incluons l'équipe marketing dans cette décision."}, {"expression": "On the back burner", "categorie": "Anglais professionnel", "traduction": "Mis de côté temporairement", "explication": "S'utilise pour un projet ou une tâche momentanément suspendue en priorité.", "exemple_en": "We'll put that idea on the back burner for now.", "exemple_fr": "On va mettre cette idée de côté pour le moment."}, {"expression": "Quick win", "categorie": "Anglais professionnel", "traduction": "Une victoire rapide et facile", "explication": "Désigne une action simple à mettre en œuvre qui produit un résultat positif rapide.", "exemple_en": "Let's identify a few quick wins before tackling the big project.", "exemple_fr": "Identifions quelques victoires rapides avant de s'attaquer au gros projet."}, {"expression": "Streamline", "categorie": "Anglais professionnel", "traduction": "Simplifier, rationaliser un processus", "explication": "S'utilise pour parler de l'amélioration de l'efficacité d'un processus en supprimant les étapes inutiles.", "exemple_en": "We need to streamline our approval process.", "exemple_fr": "On doit rationaliser notre processus de validation."}, {"expression": "Synergy", "categorie": "Anglais professionnel", "traduction": "Synergie", "explication": "Désigne l'effet positif produit par la collaboration entre plusieurs équipes ou entités.", "exemple_en": "The merger created strong synergies between the two teams.", "exemple_fr": "La fusion a créé de fortes synergies entre les deux équipes."}, {"expression": "Wrap up", "categorie": "Anglais professionnel", "traduction": "Conclure, finaliser", "explication": "S'utilise pour dire que l'on termine une réunion, une tâche ou un projet.", "exemple_en": "Let's wrap up this meeting, we're running out of time.", "exemple_fr": "Concluons cette réunion, on manque de temps."}, {"expression": "Onboard someone", "categorie": "Anglais professionnel", "traduction": "Intégrer un nouvel employé", "explication": "S'utilise pour désigner le processus d'accueil et de formation d'un nouveau collaborateur.", "exemple_en": "HR will onboard the new hires next Monday.", "exemple_fr": "Les RH vont intégrer les nouvelles recrues lundi prochain."}, {"expression": "Drill down", "categorie": "Anglais professionnel", "traduction": "Creuser un sujet en détail", "explication": "S'utilise pour parler d'une analyse plus approfondie d'un sujet ou de données.", "exemple_en": "Let's drill down into the sales figures for this region.", "exemple_fr": "Creusons plus en détail les chiffres de vente de cette région."}, {"expression": "Table an idea", "categorie": "Anglais professionnel", "traduction": "Proposer une idée à discuter (ou la reporter, selon le contexte)", "explication": "En anglais américain, signifie repousser une discussion ; en anglais britannique, signifie au contraire la soumettre pour discussion immédiate — le sens dépend du contexte.", "exemple_en": "Let's table this idea for next week's meeting.", "exemple_fr": "Reportons cette idée à la réunion de la semaine prochaine."}, {"expression": "Awesome", "categorie": "Expressions familières", "traduction": "Génial", "explication": "Adjectif informel très courant pour exprimer l'enthousiasme ou l'approbation.", "exemple_en": "You got the job? That's awesome!", "exemple_fr": "Tu as eu le poste ? C'est génial !"}, {"expression": "Freak out", "categorie": "Expressions familières", "traduction": "Paniquer", "explication": "S'utilise pour décrire une réaction de panique ou de forte anxiété.", "exemple_en": "Don't freak out, we still have time to fix this.", "exemple_fr": "Ne panique pas, on a encore le temps de régler ça."}, {"expression": "Hang out", "categorie": "Expressions familières", "traduction": "Traîner, passer du temps ensemble", "explication": "S'utilise pour parler de moments informels passés entre amis.", "exemple_en": "Do you want to hang out this weekend?", "exemple_fr": "Tu veux qu'on traîne ensemble ce week-end ?"}, {"expression": "I'm down", "categorie": "Expressions familières", "traduction": "Je suis partant", "explication": "Façon informelle d'accepter une proposition ou une invitation.", "exemple_en": "We're going to the beach later. — I'm down!", "exemple_fr": "On va à la plage plus tard. — Je suis partant !"}, {"expression": "Legit", "categorie": "Expressions familières", "traduction": "Authentique, sérieux", "explication": "Abréviation informelle de 'legitimate', utilisée pour confirmer que quelque chose est réel ou fiable.", "exemple_en": "Is this website legit or a scam?", "exemple_fr": "Ce site est-il fiable ou une arnaque ?"}, {"expression": "Salty", "categorie": "Expressions familières", "traduction": "Rancunier, vexé", "explication": "S'utilise pour décrire quelqu'un qui reste contrarié ou amer après un événement.", "exemple_en": "He's still salty about losing the game last week.", "exemple_fr": "Il est encore vexé d'avoir perdu le match la semaine dernière."}, {"expression": "Throw shade", "categorie": "Expressions familières", "traduction": "Critiquer subtilement quelqu'un", "explication": "S'utilise pour décrire une remarque discrètement méprisante ou moqueuse envers quelqu'un.", "exemple_en": "She threw some shade at her ex on social media.", "exemple_fr": "Elle a subtilement critiqué son ex sur les réseaux sociaux."}, {"expression": "Vibe", "categorie": "Expressions familières", "traduction": "Ambiance, ressenti", "explication": "S'utilise pour parler de l'atmosphère générale d'un lieu ou d'une situation.", "exemple_en": "This café has such a cozy vibe.", "exemple_fr": "Ce café a une ambiance vraiment chaleureuse."}, {"expression": "Wing it", "categorie": "Expressions familières", "traduction": "Improviser", "explication": "S'utilise pour dire que l'on fait quelque chose sans préparation particulière.", "exemple_en": "I didn't prepare a speech, I'll just wing it.", "exemple_fr": "Je n'ai pas préparé de discours, je vais improviser."}, {"expression": "Catch you later", "categorie": "Expressions familières", "traduction": "À plus tard", "explication": "Façon décontractée de dire au revoir à quelqu'un que l'on reverra bientôt.", "exemple_en": "Alright, I'm heading out, catch you later!", "exemple_fr": "Bon, j'y vais, à plus tard !"}, {"expression": "Epic fail", "categorie": "Expressions familières", "traduction": "Échec cuisant", "explication": "S'utilise de façon humoristique pour parler d'un échec particulièrement marquant.", "exemple_en": "Forgetting my own birthday was an epic fail.", "exemple_fr": "Oublier mon propre anniversaire était un échec cuisant."}, {"expression": "Low-key", "categorie": "Expressions familières", "traduction": "Discrètement / un peu", "explication": "S'utilise pour nuancer une affirmation, en la présentant comme modeste ou discrète.", "exemple_en": "I'm low-key excited about this trip.", "exemple_fr": "Je suis un peu excité par ce voyage, discrètement."}, {"expression": "A picture is worth a thousand words", "categorie": "Proverbes et dictons", "traduction": "Une image vaut mille mots", "explication": "Souligne qu'une image peut communiquer une idée plus efficacement qu'une longue explication.", "exemple_en": "I won't describe the view, a picture is worth a thousand words.", "exemple_fr": "Je ne vais pas décrire la vue, une image vaut mille mots."}, {"expression": "All that glitters is not gold", "categorie": "Proverbes et dictons", "traduction": "Tout ce qui brille n'est pas or", "explication": "Met en garde contre le fait de juger la valeur de quelque chose uniquement sur son apparence attrayante.", "exemple_en": "The job offer sounded great, but all that glitters is not gold.", "exemple_fr": "L'offre d'emploi avait l'air génial, mais tout ce qui brille n'est pas or."}, {"expression": "Birds of a feather flock together", "categorie": "Proverbes et dictons", "traduction": "Qui se ressemble s'assemble", "explication": "Souligne que les personnes ayant des points communs ont tendance à se rassembler.", "exemple_en": "They became friends instantly—birds of a feather flock together.", "exemple_fr": "Ils sont devenus amis instantanément—qui se ressemble s'assemble."}, {"expression": "Don't put all your eggs in one basket", "categorie": "Proverbes et dictons", "traduction": "Il ne faut pas mettre tous ses œufs dans le même panier", "explication": "Conseille de diversifier ses efforts ou investissements plutôt que de tout miser sur une seule option.", "exemple_en": "Invest in different sectors, don't put all your eggs in one basket.", "exemple_fr": "Investis dans différents secteurs, ne mets pas tous tes œufs dans le même panier."}, {"expression": "Honesty is the best policy", "categorie": "Proverbes et dictons", "traduction": "L'honnêteté est la meilleure des politiques", "explication": "Encourage à toujours dire la vérité, même quand c'est difficile.", "exemple_en": "Just tell her the truth, honesty is the best policy.", "exemple_fr": "Dis-lui simplement la vérité, l'honnêteté est la meilleure des politiques."}, {"expression": "It takes two to tango", "categorie": "Proverbes et dictons", "traduction": "Il faut être deux pour se disputer", "explication": "Souligne que dans un conflit ou une situation à deux, les deux parties portent une part de responsabilité.", "exemple_en": "Don't blame only him for the argument, it takes two to tango.", "exemple_fr": "Ne blâme pas que lui pour la dispute, il faut être deux pour se disputer."}, {"expression": "Knowledge is power", "categorie": "Proverbes et dictons", "traduction": "Le savoir, c'est le pouvoir", "explication": "Souligne l'importance de l'éducation et de l'information pour réussir ou prendre de bonnes décisions.", "exemple_en": "She reads constantly because she believes knowledge is power.", "exemple_fr": "Elle lit constamment car elle pense que le savoir, c'est le pouvoir."}, {"expression": "Laughter is the best medicine", "categorie": "Proverbes et dictons", "traduction": "Le rire est le meilleur remède", "explication": "Souligne les bienfaits de l'humour et de la bonne humeur, notamment face aux difficultés.", "exemple_en": "After a stressful week, we watched a comedy—laughter is the best medicine.", "exemple_fr": "Après une semaine stressante, on a regardé une comédie—le rire est le meilleur remède."}, {"expression": "No pain, no gain", "categorie": "Proverbes et dictons", "traduction": "Sans effort, pas de résultat", "explication": "Souligne qu'il faut fournir des efforts, parfois inconfortables, pour obtenir un résultat valable.", "exemple_en": "Training every day is hard, but no pain, no gain.", "exemple_fr": "S'entraîner tous les jours est dur, mais sans effort, pas de résultat."}, {"expression": "Rome wasn't built in a day", "categorie": "Proverbes et dictons", "traduction": "Rome ne s'est pas faite en un jour", "explication": "Rappelle que les grandes réalisations demandent du temps et de la patience.", "exemple_en": "Don't get discouraged, Rome wasn't built in a day.", "exemple_fr": "Ne te décourage pas, Rome ne s'est pas faite en un jour."}, {"expression": "The pen is mightier than the sword", "categorie": "Proverbes et dictons", "traduction": "La plume est plus forte que l'épée", "explication": "Souligne que les mots et les idées ont plus de pouvoir durable que la force physique.", "exemple_en": "His powerful essay proved that the pen is mightier than the sword.", "exemple_fr": "Son essai puissant a prouvé que la plume est plus forte que l'épée."}, {"expression": "Two wrongs don't make a right", "categorie": "Proverbes et dictons", "traduction": "Deux torts ne font pas un droit", "explication": "Rappelle que se venger d'une injustice par une autre injustice ne résout rien.", "exemple_en": "I know he lied to you, but two wrongs don't make a right.", "exemple_fr": "Je sais qu'il t'a menti, mais deux torts ne font pas un droit."}, {"expression": "Where there's a will there's a way", "categorie": "Proverbes et dictons", "traduction": "Quand on veut, on peut", "explication": "Encourage à persévérer, en affirmant qu'une forte détermination permet de trouver une solution.", "exemple_en": "She finally passed the exam after failing twice—where there's a will there's a way.", "exemple_fr": "Elle a enfin réussi l'examen après avoir échoué deux fois—quand on veut, on peut."}, {"expression": "Break the bank", "categorie": "Expressions idiomatiques", "traduction": "Coûter une fortune, ruiner quelqu'un", "explication": "S'utilise pour parler d'une dépense excessive, souvent de façon exagérée et humoristique.", "exemple_en": "Buying this car won't break the bank, it's actually quite affordable.", "exemple_fr": "Acheter cette voiture ne va pas te ruiner, elle est en fait assez abordable."}, {"expression": "What's up?", "categorie": "Expressions du quotidien", "traduction": "Quoi de neuf ?", "explication": "Salutation très informelle pour demander comment vont les choses ou ce qui se passe.", "exemple_en": "Hey, what's up? Anything new?", "exemple_fr": "Salut, quoi de neuf ? Rien de nouveau ?"}, {"expression": "I'm good, thanks", "categorie": "Expressions du quotidien", "traduction": "Ça va, merci", "explication": "Réponse standard et polie à la question 'How are you?'.", "exemple_en": "How are you doing? — I'm good, thanks, and you?", "exemple_fr": "Comment vas-tu ? — Ça va, merci, et toi ?"}, {"expression": "Take care", "categorie": "Expressions du quotidien", "traduction": "Prends soin de toi", "explication": "Formule chaleureuse utilisée en fin de conversation ou pour dire au revoir.", "exemple_en": "I have to go now, take care!", "exemple_fr": "Je dois y aller maintenant, prends soin de toi !"}, {"expression": "No problem", "categorie": "Expressions du quotidien", "traduction": "Pas de problème", "explication": "S'utilise pour accepter une demande ou répondre à des remerciements.", "exemple_en": "Can you help me with this? — No problem!", "exemple_fr": "Peux-tu m'aider avec ça ? — Pas de problème !"}, {"expression": "My pleasure", "categorie": "Expressions du quotidien", "traduction": "Avec plaisir / je vous en prie", "explication": "Réponse polie utilisée après un remerciement, pour dire que l'aide a été donnée volontiers.", "exemple_en": "Thank you so much for your help. — My pleasure!", "exemple_fr": "Merci beaucoup pour ton aide. — Avec plaisir !"}, {"expression": "I have no idea", "categorie": "Expressions du quotidien", "traduction": "Je n'en ai aucune idée", "explication": "S'utilise pour exprimer une totale ignorance sur un sujet.", "exemple_en": "Where is she? — I have no idea.", "exemple_fr": "Où est-elle ? — Je n'en ai aucune idée."}, {"expression": "It depends", "categorie": "Expressions du quotidien", "traduction": "Ça dépend", "explication": "S'utilise quand une réponse varie selon les circonstances.", "exemple_en": "Do you like spicy food? — It depends on the dish.", "exemple_fr": "Tu aimes la nourriture épicée ? — Ça dépend du plat."}, {"expression": "I guess so", "categorie": "Expressions du quotidien", "traduction": "Je suppose que oui", "explication": "S'utilise pour donner un accord hésitant ou peu convaincu.", "exemple_en": "Do you think it will rain? — I guess so.", "exemple_fr": "Tu penses qu'il va pleuvoir ? — Je suppose que oui."}, {"expression": "You've got a point", "categorie": "Expressions du quotidien", "traduction": "Tu as raison / c'est un bon argument", "explication": "S'utilise pour reconnaître la validité de l'argument de quelqu'un.", "exemple_en": "Maybe we should leave earlier. — You've got a point.", "exemple_fr": "On devrait peut-être partir plus tôt. — Tu as raison."}, {"expression": "I'm not sure", "categorie": "Expressions du quotidien", "traduction": "Je ne suis pas sûr", "explication": "S'utilise pour exprimer un doute ou une incertitude.", "exemple_en": "Is this the right way? I'm not sure.", "exemple_fr": "C'est le bon chemin ? Je ne suis pas sûr."}, {"expression": "Let's see", "categorie": "Expressions du quotidien", "traduction": "Voyons voir", "explication": "S'utilise avant de réfléchir à une réponse ou d'examiner quelque chose.", "exemple_en": "Let's see what the weather is like tomorrow.", "exemple_fr": "Voyons voir quel temps il fera demain."}, {"expression": "That's the spirit", "categorie": "Expressions du quotidien", "traduction": "C'est l'esprit / voilà une bonne attitude", "explication": "S'utilise pour encourager quelqu'un qui montre une bonne attitude ou de la motivation.", "exemple_en": "I'll give it my best shot. — That's the spirit!", "exemple_fr": "Je vais faire de mon mieux. — Voilà l'esprit !"}, {"expression": "Cheer up", "categorie": "Expressions du quotidien", "traduction": "Remonte le moral, ne sois pas triste", "explication": "S'utilise pour encourager quelqu'un de triste à retrouver le sourire.", "exemple_en": "Cheer up, things will get better soon.", "exemple_fr": "Ne sois pas triste, les choses vont s'arranger bientôt."}, {"expression": "I can't complain", "categorie": "Expressions du quotidien", "traduction": "Je ne me plains pas / ça va plutôt bien", "explication": "Réponse modeste et positive à la question 'How are you?'.", "exemple_en": "How's life treating you? — I can't complain.", "exemple_fr": "Comment va la vie ? — Je ne me plains pas."}, {"expression": "Give me a second", "categorie": "Expressions du quotidien", "traduction": "Donne-moi une seconde", "explication": "S'utilise pour demander un bref moment avant de répondre ou d'agir.", "exemple_en": "Give me a second, I need to check my phone.", "exemple_fr": "Donne-moi une seconde, je dois vérifier mon téléphone."}, {"expression": "That's a relief", "categorie": "Expressions du quotidien", "traduction": "Quel soulagement", "explication": "S'utilise pour exprimer un soulagement après une inquiétude.", "exemple_en": "The exam was cancelled. — Oh, that's a relief!", "exemple_fr": "L'examen a été annulé. — Ah, quel soulagement !"}, {"expression": "I bet", "categorie": "Expressions du quotidien", "traduction": "Je parie / j'imagine bien", "explication": "S'utilise pour exprimer que l'on est presque certain de quelque chose.", "exemple_en": "She must be exhausted after that trip. — I bet.", "exemple_fr": "Elle doit être épuisée après ce voyage. — Je parie."}, {"expression": "Beats me", "categorie": "Expressions du quotidien", "traduction": "Aucune idée (familier)", "explication": "Façon informelle de dire que l'on ne sait pas du tout.", "exemple_en": "Why did he leave so early? Beats me.", "exemple_fr": "Pourquoi est-il parti si tôt ? Aucune idée."}, {"expression": "Whatever works for you", "categorie": "Expressions du quotidien", "traduction": "Comme ça t'arrange", "explication": "S'utilise pour montrer de la flexibilité face au choix de quelqu'un d'autre.", "exemple_en": "We can meet Monday or Tuesday, whatever works for you.", "exemple_fr": "On peut se voir lundi ou mardi, comme ça t'arrange."}, {"expression": "I'll pass", "categorie": "Expressions du quotidien", "traduction": "Je vais passer mon tour", "explication": "S'utilise pour décliner poliment une offre ou une invitation.", "exemple_en": "Do you want some cake? — I'll pass, thanks.", "exemple_fr": "Tu veux du gâteau ? — Je vais passer mon tour, merci."}, {"expression": "Good for you", "categorie": "Expressions du quotidien", "traduction": "Tant mieux pour toi / bien joué", "explication": "S'utilise pour féliciter quelqu'un, parfois avec une légère nuance selon le ton employé.", "exemple_en": "I finally finished my degree! — Good for you!", "exemple_fr": "J'ai enfin terminé mes études ! — Bien joué !"}, {"expression": "I'm running late", "categorie": "Expressions du quotidien", "traduction": "Je suis en retard", "explication": "S'utilise pour prévenir que l'on n'arrivera pas à l'heure prévue.", "exemple_en": "Sorry, I'm running late, I'll be there in ten minutes.", "exemple_fr": "Désolé, je suis en retard, j'arrive dans dix minutes."}, {"expression": "It's on me", "categorie": "Expressions du quotidien", "traduction": "C'est moi qui offre / c'est moi qui invite", "explication": "S'utilise pour proposer de payer pour quelqu'un d'autre.", "exemple_en": "Don't worry about the bill, it's on me tonight.", "exemple_fr": "Ne t'inquiète pas pour l'addition, c'est moi qui offre ce soir."}, {"expression": "Keep in touch", "categorie": "Expressions du quotidien", "traduction": "Restons en contact", "explication": "S'utilise en fin de rencontre pour exprimer le souhait de garder le contact.", "exemple_en": "It was great seeing you, let's keep in touch.", "exemple_fr": "C'était super de te voir, restons en contact."}, {"expression": "I'm in a rush", "categorie": "Expressions du quotidien", "traduction": "Je suis pressé", "explication": "S'utilise pour dire que l'on manque de temps et doit faire vite.", "exemple_en": "I can't talk now, I'm in a rush.", "exemple_fr": "Je ne peux pas parler maintenant, je suis pressé."}, {"expression": "Sure thing", "categorie": "Expressions du quotidien", "traduction": "Bien sûr, pas de problème", "explication": "Façon décontractée de dire oui à une demande.", "exemple_en": "Can you pass me the salt? — Sure thing!", "exemple_fr": "Tu peux me passer le sel ? — Bien sûr !"}, {"expression": "I don't mind", "categorie": "Expressions du quotidien", "traduction": "Ça ne me dérange pas", "explication": "S'utilise pour exprimer son indifférence positive face à un choix.", "exemple_en": "Do you want tea or coffee? — I don't mind, either is fine.", "exemple_fr": "Tu veux du thé ou du café ? — Ça ne me dérange pas, les deux me vont."}, {"expression": "What a coincidence", "categorie": "Expressions du quotidien", "traduction": "Quelle coïncidence", "explication": "S'utilise pour marquer sa surprise face à un hasard inattendu.", "exemple_en": "You're going to Paris too? What a coincidence!", "exemple_fr": "Tu vas aussi à Paris ? Quelle coïncidence !"}, {"expression": "That reminds me", "categorie": "Expressions du quotidien", "traduction": "Ça me fait penser à", "explication": "S'utilise pour introduire une idée ou un souvenir déclenché par la conversation.", "exemple_en": "That reminds me, I need to call my mom.", "exemple_fr": "Ça me fait penser, je dois appeler ma mère."}, {"expression": "I'll think about it", "categorie": "Expressions du quotidien", "traduction": "Je vais y réfléchir", "explication": "S'utilise pour ne pas donner une réponse immédiate à une proposition.", "exemple_en": "Do you want to join us? — I'll think about it.", "exemple_fr": "Tu veux te joindre à nous ? — Je vais y réfléchir."}, {"expression": "It's worth a try", "categorie": "Expressions du quotidien", "traduction": "Ça vaut le coup d'essayer", "explication": "S'utilise pour encourager à tenter quelque chose, même sans certitude de succès.", "exemple_en": "I'm not sure it will work, but it's worth a try.", "exemple_fr": "Je ne suis pas sûr que ça marche, mais ça vaut le coup d'essayer."}, {"expression": "I owe you one", "categorie": "Expressions du quotidien", "traduction": "Je t'en dois une", "explication": "S'utilise pour reconnaître une dette de gratitude envers quelqu'un.", "exemple_en": "Thanks for covering my shift, I owe you one.", "exemple_fr": "Merci d'avoir pris mon service, je t'en dois une."}, {"expression": "Long story short", "categorie": "Expressions du quotidien", "traduction": "Pour faire court", "explication": "S'utilise pour résumer rapidement une histoire plus longue.", "exemple_en": "Long story short, we missed the flight.", "exemple_fr": "Pour faire court, on a raté le vol."}, {"expression": "I'm on it", "categorie": "Expressions du quotidien", "traduction": "Je m'en occupe", "explication": "S'utilise pour confirmer que l'on prend immédiatement en charge une tâche.", "exemple_en": "Can you send that email? — I'm on it!", "exemple_fr": "Tu peux envoyer cet email ? — Je m'en occupe !"}, {"expression": "Better safe than sorry", "categorie": "Expressions du quotidien", "traduction": "Mieux vaut prévenir que guérir", "explication": "S'utilise pour justifier une précaution même si elle semble excessive.", "exemple_en": "Take an umbrella, better safe than sorry.", "exemple_fr": "Prends un parapluie, mieux vaut prévenir que guérir."}, {"expression": "I'll take your word for it", "categorie": "Expressions du quotidien", "traduction": "Je te crois sur parole", "explication": "S'utilise pour accepter une affirmation sans la vérifier soi-même.", "exemple_en": "You say it's the best restaurant in town? I'll take your word for it.", "exemple_fr": "Tu dis que c'est le meilleur restaurant en ville ? Je te crois sur parole."}, {"expression": "That's more like it", "categorie": "Expressions du quotidien", "traduction": "Voilà qui est mieux", "explication": "S'utilise pour exprimer une amélioration satisfaisante par rapport à la situation précédente.", "exemple_en": "Now that's more like it, great job!", "exemple_fr": "Voilà qui est mieux, bien joué !"}, {"expression": "I couldn't help it", "categorie": "Expressions du quotidien", "traduction": "Je n'ai pas pu m'en empêcher", "explication": "S'utilise pour s'excuser d'une réaction ou d'un comportement incontrôlé.", "exemple_en": "I know I shouldn't have laughed, but I couldn't help it.", "exemple_fr": "Je sais que je n'aurais pas dû rire, mais je n'ai pas pu m'en empêcher."}, {"expression": "Easier said than done", "categorie": "Expressions du quotidien", "traduction": "Plus facile à dire qu'à faire", "explication": "S'utilise pour souligner qu'une action recommandée est en réalité difficile à réaliser.", "exemple_en": "Just relax, they said. Easier said than done!", "exemple_fr": "Détends-toi, m'ont-ils dit. Plus facile à dire qu'à faire !"}, {"expression": "I wouldn't count on it", "categorie": "Expressions du quotidien", "traduction": "Je ne compterais pas trop là-dessus", "explication": "S'utilise pour exprimer un doute sur la réalisation probable de quelque chose.", "exemple_en": "Will he show up on time? I wouldn't count on it.", "exemple_fr": "Il va arriver à l'heure ? Je ne compterais pas trop là-dessus."}, {"expression": "That's the least of my worries", "categorie": "Expressions du quotidien", "traduction": "C'est le cadet de mes soucis", "explication": "S'utilise pour dire qu'un problème n'est pas prioritaire face à d'autres préoccupations plus importantes.", "exemple_en": "The weather is bad, but that's the least of my worries right now.", "exemple_fr": "Le temps est mauvais, mais c'est le cadet de mes soucis en ce moment."}, {"expression": "I'll keep that in mind", "categorie": "Expressions du quotidien", "traduction": "Je vais garder ça en tête", "explication": "S'utilise pour dire que l'on tiendra compte d'un conseil ou d'une information à l'avenir.", "exemple_en": "Thanks for the advice, I'll keep that in mind.", "exemple_fr": "Merci pour le conseil, je vais garder ça en tête."}, {"expression": "No hard feelings", "categorie": "Expressions du quotidien", "traduction": "Sans rancune", "explication": "S'utilise pour montrer que l'on ne garde pas de ressentiment après un désaccord.", "exemple_en": "I disagree with you, but no hard feelings.", "exemple_fr": "Je ne suis pas d'accord avec toi, mais sans rancune."}, {"expression": "That's a whole other story", "categorie": "Expressions du quotidien", "traduction": "Ça, c'est une autre histoire", "explication": "S'utilise pour indiquer qu'un sujet mériterait une discussion séparée et complexe.", "exemple_en": "Why he quit his job? That's a whole other story.", "exemple_fr": "Pourquoi il a quitté son travail ? Ça, c'est une autre histoire."}, {"expression": "I'll leave it up to you", "categorie": "Expressions du quotidien", "traduction": "Je te laisse décider", "explication": "S'utilise pour laisser à quelqu'un d'autre le choix final.", "exemple_en": "I don't have a preference, I'll leave it up to you.", "exemple_fr": "Je n'ai pas de préférence, je te laisse décider."}, {"expression": "It slipped my mind", "categorie": "Expressions du quotidien", "traduction": "Ça m'est sorti de la tête", "explication": "S'utilise pour s'excuser d'avoir oublié quelque chose.", "exemple_en": "I forgot to call you back, it completely slipped my mind.", "exemple_fr": "J'ai oublié de te rappeler, ça m'est complètement sorti de la tête."}, {"expression": "Let's play it by ear", "categorie": "Expressions du quotidien", "traduction": "On avisera / on improvisera selon la situation", "explication": "S'utilise pour dire que l'on décidera au fur et à mesure plutôt que de tout planifier à l'avance.", "exemple_en": "We don't have a fixed plan, let's just play it by ear.", "exemple_fr": "On n'a pas de plan fixe, on avisera au fur et à mesure."}, {"expression": "I hear you", "categorie": "Expressions du quotidien", "traduction": "Je comprends ce que tu ressens", "explication": "S'utilise pour montrer de l'empathie et confirmer que l'on comprend le point de vue de quelqu'un.", "exemple_en": "I know work has been stressful. — I hear you.", "exemple_fr": "Je sais que le travail a été stressant. — Je comprends ce que tu ressens."}, {"expression": "Let's call it a day", "categorie": "Expressions du quotidien", "traduction": "Arrêtons-nous là pour aujourd'hui", "explication": "S'utilise pour suggérer de terminer une activité ou une journée de travail.", "exemple_en": "We've done enough for today, let's call it a day.", "exemple_fr": "On a assez fait pour aujourd'hui, arrêtons-nous là."}, {"expression": "I'm up for it", "categorie": "Expressions du quotidien", "traduction": "Je suis partant / motivé", "explication": "S'utilise pour montrer son enthousiasme à participer à quelque chose.", "exemple_en": "Want to try that new restaurant? — I'm up for it!", "exemple_fr": "Tu veux essayer ce nouveau restaurant ? — Je suis partant !"}, {"expression": "A blessing in disguise", "categorie": "Expressions idiomatiques", "traduction": "Un mal pour un bien", "explication": "S'utilise pour décrire un événement qui semblait négatif mais qui s'avère finalement bénéfique.", "exemple_en": "Losing that job was a blessing in disguise, I found something better.", "exemple_fr": "Perdre ce travail était un mal pour un bien, j'ai trouvé mieux."}, {"expression": "Add fuel to the fire", "categorie": "Expressions idiomatiques", "traduction": "Jeter de l'huile sur le feu", "explication": "S'utilise pour parler d'une action qui aggrave une situation déjà tendue.", "exemple_en": "Bringing up the past only added fuel to the fire.", "exemple_fr": "Rappeler le passé n'a fait que jeter de l'huile sur le feu."}, {"expression": "Bite off more than you can chew", "categorie": "Expressions idiomatiques", "traduction": "Avoir les yeux plus gros que le ventre", "explication": "S'utilise quand quelqu'un accepte plus de responsabilités qu'il ne peut réellement gérer.", "exemple_en": "He bit off more than he could chew by taking on three projects at once.", "exemple_fr": "Il a eu les yeux plus gros que le ventre en prenant trois projets à la fois."}, {"expression": "Caught red-handed", "categorie": "Expressions idiomatiques", "traduction": "Pris la main dans le sac", "explication": "S'utilise quand quelqu'un est surpris en flagrant délit.", "exemple_en": "He was caught red-handed stealing cookies from the jar.", "exemple_fr": "Il a été pris la main dans le sac en train de voler des cookies."}, {"expression": "Costs a pretty penny", "categorie": "Expressions idiomatiques", "traduction": "Coûter cher", "explication": "S'utilise pour décrire quelque chose de coûteux.", "exemple_en": "That watch must have cost a pretty penny.", "exemple_fr": "Cette montre a dû coûter cher."}, {"expression": "Get the hang of it", "categorie": "Expressions idiomatiques", "traduction": "Prendre le coup de main", "explication": "S'utilise quand on devient progressivement à l'aise avec une nouvelle activité.", "exemple_en": "It took a while, but I finally got the hang of it.", "exemple_fr": "Ça a pris du temps, mais j'ai fini par prendre le coup de main."}, {"expression": "Hit the ground running", "categorie": "Expressions idiomatiques", "traduction": "Démarrer sur les chapeaux de roues", "explication": "S'utilise pour parler d'un démarrage rapide et efficace dans une nouvelle activité.", "exemple_en": "She hit the ground running on her first day at the new job.", "exemple_fr": "Elle a démarré sur les chapeaux de roues dès son premier jour au nouveau travail."}, {"expression": "Miss the boat", "categorie": "Expressions idiomatiques", "traduction": "Rater le coche", "explication": "S'utilise pour dire que l'on a manqué une occasion.", "exemple_en": "If you don't apply now, you'll miss the boat.", "exemple_fr": "Si tu ne postules pas maintenant, tu vas rater le coche."}, {"expression": "Pull someone's leg", "categorie": "Expressions idiomatiques", "traduction": "Faire marcher quelqu'un", "explication": "S'utilise pour dire que l'on taquine quelqu'un en lui racontant quelque chose de faux, sans méchanceté.", "exemple_en": "Relax, I'm just pulling your leg!", "exemple_fr": "Détends-toi, je te fais juste marcher !"}, {"expression": "See eye to eye", "categorie": "Expressions idiomatiques", "traduction": "Être sur la même longueur d'onde", "explication": "S'utilise pour dire que deux personnes partagent le même avis sur un sujet.", "exemple_en": "We don't always see eye to eye, but we respect each other.", "exemple_fr": "On n'est pas toujours sur la même longueur d'onde, mais on se respecte."}, {"expression": "Back up", "categorie": "Verbes à particule", "traduction": "Sauvegarder / soutenir / reculer", "explication": "Peut signifier sauvegarder des données, soutenir quelqu'un, ou reculer physiquement selon le contexte.", "exemple_en": "Make sure to back up your files before updating the software.", "exemple_fr": "Assure-toi de sauvegarder tes fichiers avant de mettre à jour le logiciel."}, {"expression": "Catch up", "categorie": "Verbes à particule", "traduction": "Rattraper son retard / se remettre au niveau", "explication": "S'utilise pour parler du fait de rattraper un travail en retard ou de retrouver quelqu'un après une longue absence.", "exemple_en": "Let's catch up over coffee sometime this week.", "exemple_fr": "Retrouvons-nous autour d'un café cette semaine pour se raconter."}, {"expression": "Check in", "categorie": "Verbes à particule", "traduction": "S'enregistrer / prendre des nouvelles", "explication": "S'utilise pour l'enregistrement dans un hôtel ou un vol, ou pour prendre des nouvelles de quelqu'un.", "exemple_en": "I just wanted to check in and see how you're doing.", "exemple_fr": "Je voulais juste prendre de tes nouvelles."}, {"expression": "Cheer someone up", "categorie": "Verbes à particule", "traduction": "Remonter le moral à quelqu'un", "explication": "S'utilise pour parler du fait de réconforter une personne triste.", "exemple_en": "I brought her flowers to cheer her up.", "exemple_fr": "Je lui ai apporté des fleurs pour lui remonter le moral."}, {"expression": "Come up with", "categorie": "Verbes à particule", "traduction": "Trouver, proposer (une idée)", "explication": "S'utilise pour parler du fait de produire une idée ou une solution.", "exemple_en": "She came up with a brilliant idea for the project.", "exemple_fr": "Elle a trouvé une idée brillante pour le projet."}, {"expression": "Drop by", "categorie": "Verbes à particule", "traduction": "Passer voir (rapidement)", "explication": "S'utilise pour une visite brève et informelle chez quelqu'un.", "exemple_en": "Feel free to drop by anytime this weekend.", "exemple_fr": "N'hésite pas à passer me voir ce week-end."}, {"expression": "Fill in", "categorie": "Verbes à particule", "traduction": "Remplacer temporairement / remplir (un formulaire)", "explication": "S'utilise pour remplacer quelqu'un temporairement, ou pour compléter un document.", "exemple_en": "Can you fill in for me at the meeting tomorrow?", "exemple_fr": "Peux-tu me remplacer à la réunion demain ?"}, {"expression": "Keep up with", "categorie": "Verbes à particule", "traduction": "Suivre le rythme de", "explication": "S'utilise pour dire que l'on parvient à rester au même niveau ou rythme que quelqu'un ou quelque chose.", "exemple_en": "It's hard to keep up with all the new technology.", "exemple_fr": "C'est difficile de suivre le rythme de toutes les nouvelles technologies."}, {"expression": "Pass out", "categorie": "Verbes à particule", "traduction": "S'évanouir / distribuer", "explication": "Peut signifier perdre connaissance, ou distribuer quelque chose selon le contexte.", "exemple_en": "She passed out from the heat during the hike.", "exemple_fr": "Elle s'est évanouie à cause de la chaleur pendant la randonnée."}, {"expression": "Put up with", "categorie": "Verbes à particule", "traduction": "Supporter, tolérer", "explication": "S'utilise pour parler du fait d'endurer une situation ou un comportement désagréable.", "exemple_en": "I don't know how she puts up with all that noise.", "exemple_fr": "Je ne sais pas comment elle supporte tout ce bruit."}, {"expression": "Elevator pitch", "categorie": "Anglais professionnel", "traduction": "Présentation éclair (le temps d'un trajet en ascenseur)", "explication": "Désigne une présentation très courte et percutante d'un projet ou d'une idée.", "exemple_en": "Prepare a solid elevator pitch before meeting the investors.", "exemple_fr": "Prépare une bonne présentation éclair avant de rencontrer les investisseurs."}, {"expression": "Hit the ground running (business)", "categorie": "Anglais professionnel", "traduction": "Être opérationnel dès le premier jour", "explication": "S'utilise en contexte professionnel pour un nouvel employé rapidement productif.", "exemple_en": "The new hire really hit the ground running.", "exemple_fr": "La nouvelle recrue a vraiment été opérationnelle dès le premier jour."}, {"expression": "Keep someone posted", "categorie": "Anglais professionnel", "traduction": "Tenir quelqu'un informé", "explication": "S'utilise pour promettre de donner des mises à jour régulières sur un sujet.", "exemple_en": "I'll keep you posted on the project's progress.", "exemple_fr": "Je te tiendrai informé de l'avancement du projet."}, {"expression": "Micromanage", "categorie": "Anglais professionnel", "traduction": "Micro-gérer", "explication": "S'utilise pour décrire un management excessivement contrôlant sur les moindres détails.", "exemple_en": "Employees don't like when managers micromanage every task.", "exemple_fr": "Les employés n'aiment pas quand les managers micro-gèrent chaque tâche."}, {"expression": "On the fence", "categorie": "Anglais professionnel", "traduction": "Indécis, ne pas avoir tranché", "explication": "S'utilise pour parler d'une hésitation entre deux décisions.", "exemple_en": "I'm still on the fence about accepting the offer.", "exemple_fr": "Je suis encore indécis quant à accepter l'offre."}, {"expression": "Pull the plug", "categorie": "Anglais professionnel", "traduction": "Mettre fin à un projet", "explication": "S'utilise pour parler de l'arrêt définitif d'un projet ou d'une initiative.", "exemple_en": "Management decided to pull the plug on the failing project.", "exemple_fr": "La direction a décidé de mettre fin au projet en échec."}, {"expression": "Raise the bar", "categorie": "Anglais professionnel", "traduction": "Relever la barre / augmenter les exigences", "explication": "S'utilise pour parler de l'augmentation du niveau d'exigence ou de qualité attendu.", "exemple_en": "The new manager really raised the bar for the team.", "exemple_fr": "Le nouveau manager a vraiment relevé la barre pour l'équipe."}, {"expression": "Run it by someone", "categorie": "Anglais professionnel", "traduction": "Demander l'avis de quelqu'un", "explication": "S'utilise pour dire que l'on souhaite consulter quelqu'un avant de finaliser une décision.", "exemple_en": "Let me run it by my manager before confirming.", "exemple_fr": "Laisse-moi demander l'avis de mon manager avant de confirmer."}, {"expression": "Think on your feet", "categorie": "Anglais professionnel", "traduction": "Réagir rapidement, improviser intelligemment", "explication": "S'utilise pour valoriser la capacité à réagir efficacement face à l'imprévu.", "exemple_en": "She had to think on her feet during the client's unexpected question.", "exemple_fr": "Elle a dû réagir rapidement face à la question inattendue du client."}, {"expression": "Touch and go", "categorie": "Anglais professionnel", "traduction": "Incertain, en équilibre précaire", "explication": "S'utilise pour décrire une situation dont l'issue reste incertaine.", "exemple_en": "The negotiations were touch and go until the very last moment.", "exemple_fr": "Les négociations sont restées incertaines jusqu'au tout dernier moment."}, {"expression": "A friend in need is a friend indeed", "categorie": "Proverbes et dictons", "traduction": "C'est dans le besoin qu'on reconnaît ses vrais amis", "explication": "Souligne que les véritables amis se révèlent dans les moments difficiles.", "exemple_en": "She helped me move at midnight—a friend in need is a friend indeed.", "exemple_fr": "Elle m'a aidé à déménager à minuit—c'est dans le besoin qu'on reconnaît ses vrais amis."}, {"expression": "Don't bite the hand that feeds you", "categorie": "Proverbes et dictons", "traduction": "Il ne faut pas mordre la main qui te nourrit", "explication": "Met en garde contre le fait de nuire à celui qui nous aide ou nous soutient.", "exemple_en": "Criticizing your biggest client publicly is like biting the hand that feeds you.", "exemple_fr": "Critiquer son plus gros client publiquement, c'est mordre la main qui te nourrit."}, {"expression": "Don't cry over spilt milk", "categorie": "Proverbes et dictons", "traduction": "Ce qui est fait est fait, inutile de pleurer", "explication": "Encourage à ne pas s'attarder sur une erreur ou un événement passé irréversible.", "exemple_en": "The deal fell through, but don't cry over spilt milk.", "exemple_fr": "L'accord est tombé à l'eau, mais inutile de pleurer sur ce qui est fait."}, {"expression": "Fool élétravaille."}, {"expression": "Crash (fall asleep)", "categorie": "Expressions familières", "traduction": "S'endormir d'un coup, s'écrouler de fatigue", "explication": "S'utilise pour parler du fait de s'endormir rapidement à cause de la fatigue.", "exemple_en": "I'm going to crash as soon as I get home.", "exemple_fr": "Je vais m'écrouler dès que je rentre à la maison."}, {"expression": "Creep someone out", "categorie": "Expressions familières", "traduction": "Mettre quelqu'un mal à l'aise", "explication": "S'utilise pour parler d'une sensation désagréable ou d'un malaise causé par quelqu'un ou quelque chose.", "exemple_en": "That abandoned house really creeps me out.", "exemple_fr": "Cette maison abandonnée me met vraiment mal à l'aise."}, {"expression": "Ditch someone", "categorie": "Expressions familières", "traduction": "Planter quelqu'un, l'abandonner", "explication": "S'utilise pour parler du fait de quitter quelqu'un brusquement ou de l'abandonner sans prévenir.", "exemple_en": "They ditched me at the party to go to another bar.", "exemple_fr": "Ils m'ont planté à la fête pour aller dans un autre bar."}, {"expression": "Flake on someone", "categorie": "Expressions familières", "traduction": "Se désister au dernier moment", "explication": "S'utilise pour une personne peu fiable qui annule souvent ses engagements.", "exemple_en": "She always flakes on our plans at the last minute.", "exemple_fr": "Elle se désiste toujours au dernier moment sur nos plans."}, {"expression": "Pig out", "categorie": "Expressions familières", "traduction": "Se goinfrer", "explication": "S'utilise pour parler du fait de manger excessivement, souvent avec plaisir coupable.", "exemple_en": "We totally pigged out on pizza last night.", "exemple_fr": "On s'est complètement goinfrés de pizza hier soir."}, {"expression": "Psych someone out", "categorie": "Expressions familières", "traduction": "Déstabiliser quelqu'un psychologiquement", "explication": "S'utilise pour parler du fait d'in exemple_fr": "On verra ça le moment venu."}, {"expression": "Down to earth", "categorie": "Expressions idiomatiques", "traduction": "Terre à terre, simple et humble", "explication": "Décrit une personne simple et sans prétention malgré son succès.", "exemple_en": "Despite her fame, she's very down to earth.", "exemple_fr": "Malgré sa célébrité, elle reste très simple."}, {"expression": "Draw the line", "categorie": "Expressions idiomatiques", "traduction": "Fixer une limite", "explication": "S'utilise pour indiquer où s'arrête ce que l'on est prêt à tolérer.", "exemple_en": "I draw the line at lying to clients.", "exemple_fr": "Je fixe une limite : je ne mens pas aux clients."}, {"expression": "Face the music", "categorie": "Expressions idiomatiques", "traduction": "Assumer les conséquences", "explication": "S'utilise pour dire que l'on doit affronter une situation difficile ou une punition.", "exemple_en": "He had to face the music after missing the deadline.", "exemple_fr": "Il a dû assumer les conséquences après avoir raté l'échéance."}, {"expression": "Fall through the cracks", "categorie": "Expressions idiomatiques", "traduction": "Passer entre les mailles du filet", "explication": "S'utilise pour parler de quelque chose oublié ou négligé.", "exemple_en": "Some cases fall through the cracks of the system.", "exemple_fr": "Certains cas passent entre les mailles du filet du système."}, {"expression": "Get out of hand", "categorie": "Expressions idiomatiques", "traduction": "Devenir incontrôlable", "explication": "S'utilise quand une situation dégénère au-delà de tout contrôle.", "exemple_en": "The party got out of hand quickly.", "exemple_fr": "La fête est vite devenue incontrôlable."}, {"expression": "Give someone the benefit of the doubt", "categorie": "Expressions idiomatiques", "traduction": "Accorder le bénéfice du doute", "explication": "S'utilise pour choisir de faire confiance malgré une incertitude.", "exemple_en": "I'll give him the benefit of the doubt
