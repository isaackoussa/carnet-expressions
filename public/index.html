let entries = ENTRIES.map((t,i)=>({ id:i+1, ...t }));
let expandedRow = null;

function dayOfYear(d){
  const start = new Date(d.getFullYear(), 0, 0);
  return Math.floor((d - start) / 86400000);
}
function wordOfDayEntry(){
  const idx = dayOfYear(new Date()) % entries.length;
  return entries[idx];
}
function pickRandomEntry(){
  return entries[Math.floor(Math.random() * entries.length)];
}

function renderStats(){
  document.getElementById('stats').innerHTML = `<b>${entries.length}</b> expressions au carnet`;
}
function renderCategoryFilter(){
  const sel = document.getElementById('categoryFilter');
  const cats = [...new Set(entries.map(e=>e.categorie))].sort();
  sel.innerHTML = '<option value="">Toutes catégories</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
}
let selectedVoiceURI = '';
let availableVoices = [];

function loadVoices(){
  if(!('speechSynthesis' in window)) return;
  availableVoices = window.speechSynthesis.getVoices().filter(v => v.lang && v.lang.startsWith('en'));
  const sel = document.getElementById('voiceSelect');
  if(!sel) return;
  const current = sel.value;
  sel.innerHTML = '<option value="">Voix par défaut</option>' + availableVoices.map(v =>
    `<option value="${v.voiceURI}">${v.name} (${v.lang})</option>`
  ).join('');
  if(current) sel.value = current;
  const saved = localStorage.getItem('carnet-voice');
  if(saved && availableVoices.some(v=>v.voiceURI===saved)){
    sel.value = saved;
    selectedVoiceURI = saved;
  }
}

function speak(text, lang){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang || 'en-US';
  utter.rate = 0.92;
  let chosenVoice = null;
  if(selectedVoiceURI){
    chosenVoice = availableVoices.find(v => v.voiceURI === selectedVoiceURI);
  }
  if(!chosenVoice){
    const voices = window.speechSynthesis.getVoices();
    chosenVoice = voices.find(v => v.lang === (lang || 'en-US')) || voices.find(v => v.lang && v.lang.startsWith('en'));
  }
  if(chosenVoice) utter.voice = chosenVoice;
  window.speechSynthesis.speak(utter);
}

function initVoicePicker(){
  if(!('speechSynthesis' in window)) return;
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
  const sel = document.getElementById('voiceSelect');
  if(sel){
    sel.addEventListener('change', ()=>{
      selectedVoiceURI = sel.value;
      localStorage.setItem('carnet-voice', selectedVoiceURI);
      if(selectedVoiceURI) speak('Hello, this is how I sound.', 'en-US');
    });
  }
}
function attachSpeakButtons(container){
  container.querySelectorAll('.speak-btn').forEach(btn=>{
    btn.addEventListener('click', (evt)=>{
      evt.stopPropagation();
      speak(btn.getAttribute('data-text'), 'en-US');
    });
  });
}

function renderCard(entry){
  const card = document.getElementById('wordOfDayCard');
  const color = TAB_COLORS[entry.categorie] || 'var(--ballpoint)';
  card.innerHTML = `
    <span class="tab" style="background:${color}">${entry.categorie}</span>
    <h2 class="expression-en">${entry.expression} <button class="speak-btn" data-text="${entry.expression.replace(/"/g,'&quot;')}" title="Écouter">🔊</button></h2>
    <p class="translation">${entry.traduction}</p>
    <p class="explication">${entry.explication}</p>
    <div class="example-box">
      <p class="example-en">${entry.exemple_en} <button class="speak-btn" data-text="${entry.exemple_en.replace(/"/g,'&quot;')}" title="Écouter l'exemple">🔊</button></p>
      <p class="example-fr">${entry.exemple_fr}</p>
    </div>
  `;
  attachSpeakButtons(card);
}
function renderLedger(){
  const listEl = document.getElementById('ledgerList');
  const searchVal = document.getElementById('search').value.toLowerCase().trim();
  const catVal = document.getElementById('categoryFilter').value;

  let filtered = entries.filter(e=>{
    const matchesSearch = !searchVal || e.expression.toLowerCase().includes(searchVal) || e.traduction.toLowerCase().includes(searchVal);
    const matchesCat = !catVal || e.categorie === catVal;
    return matchesSearch && matchesCat;
  });

  if(filtered.length === 0){
    listEl.innerHTML = `<div class="empty">Aucune expression ne correspond à cette recherche.</div>`;
    return;
  }

  listEl.innerHTML = filtered.map(e=>{
    const idx = entries.indexOf(e) + 1;
    const isExpanded = expandedRow === e.id;
    const color = TAB_COLORS[e.categorie] || 'var(--ballpoint)';
    return `
      <div class="row" data-id="${e.id}">
        <div class="row-idx">${String(idx).padStart(3,'0')}</div>
        <div>
          <div class="row-en">${e.expression} <button class="speak-btn row-speak-btn" data-text="${e.expression.replace(/"/g,'&quot;')}" title="Écouter">🔊</button></div>
          ${!isExpanded ? `<div class="row-tr">${e.traduction}</div>` : ''}
        </div>
        <div class="row-tag" style="background:${color}">${e.categorie}</div>
        ${isExpanded ? `<div class="row-expanded">
          <p class="translation">${e.traduction}</p>
          <p class="explication">${e.explication}</p>
          <div class="example-box">
            <p class="example-en">${e.exemple_en} <button class="speak-btn row-speak-btn" data-text="${e.exemple_en.replace(/"/g,'&quot;')}" title="Écouter l'exemple">🔊</button></p>
            <p class="example-fr">${e.exemple_fr}</p>
          </div>
        </div>` : ''}
      </div>
    `;
  }).join('');

  attachSpeakButtons(listEl);
  listEl.querySelectorAll('.row').forEach(row=>{
    row.addEventListener('click', ()=>{
      const id = Number(row.getAttribute('data-id'));
      expandedRow = expandedRow === id ? null : id;
      renderLedger();
    });
  });
}

function initEmailGate(){
  const gate = document.getElementById('emailGate');
  const savedEmail = localStorage.getItem('carnet-gate-email');
  if(savedEmail){
    gate.style.display = 'none';
    return;
  }

  const emailInput = document.getElementById('gateEmail');
  const errorEl = document.getElementById('gateError');
  const submitBtn = document.getElementById('gateSubmit');

  submitBtn.addEventListener('click', async ()=>{
    const email = emailInput.value.trim();
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
      errorEl.textContent = 'Entre un email valide.';
      return;
    }
    submitBtn.disabled = true;
    submitBtn.textContent = 'Vérification…';
    try{
      const res = await fetch('/.netlify/functions/collect-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      if(!res.ok){
        const data = await res.json();
        throw new Error(data.error || 'Erreur');
      }
      localStorage.setItem('carnet-gate-email', email);
      gate.style.display = 'none';
    } catch(e){
      errorEl.textContent = "Une erreur est survenue, réessaie.";
      submitBtn.disabled = false;
      submitBtn.textContent = 'Continuer';
    }
  });

  emailInput.addEventListener('keydown', (evt)=>{
    if(evt.key === 'Enter') submitBtn.click();
  });
}

const VAPID_PUBLIC_KEY = 'BJNH5vJP0MjV49zfasQFmHZpBTxdqlJ-YYn-FXdvVlVcTNCza3vv3Y_PMPX7T3VDuVR6a5g1VlvVmida1ooC7_Q';

function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  return Uint8Array.from([...rawData].map(char => char.charCodeAt(0)));
}

async function initNotifications(){
  const btn = document.getElementById('btnEnableNotif');
  const statusEl = document.getElementById('notifStatus');
  if(!btn) return;

  if(!('Notification' in window) || !('serviceWorker' in navigator) || !('PushManager' in window)){
    btn.style.display = 'none';
    return;
  }

  const updateStatus = () => {
    if(Notification.permission === 'granted'){
      btn.textContent = '🔔 Notifications activées';
      btn.disabled = true;
      statusEl.textContent = "Tu recevras l'expression du jour à 18h (heure d'Abidjan).";
    } else if(Notification.permission === 'denied'){
      btn.textContent = '🔕 Notifications bloquées';
      btn.disabled = true;
      statusEl.textContent = "Débloque les notifications dans les réglages de ton navigateur pour ce site.";
    }
  };
  updateStatus();

  btn.addEventListener('click', async ()=>{
    btn.disabled = true;
    btn.textContent = 'Activation…';
    try{
      const permission = await Notification.requestPermission();
      if(permission !== 'granted'){
        updateStatus();
        return;
      }
      const registration = await navigator.serviceWorker.ready;
      let subscription = await registration.pushManager.getSubscription();
      if(!subscription){
        subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
      }
      await fetch('/.netlify/functions/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subscription })
      });
      updateStatus();
    } catch(e){
      statusEl.textContent = "Erreur lors de l'activation des notifications.";
      btn.disabled = false;
      btn.textContent = "🔔 Recevoir l'expression du jour à 18h";
    }
  });
}
